version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./tp_server
      dockerfile: Dockerfile
    container_name: trade-predictor-backend
    ports:
      - "8001:8001"
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - ENVIRONMENT=production
    env_file:
      - ./tp_server/.env
    volumes:
      - ./tp_server:/app
      - ./tp_client/dist:/app/static
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - trade-predictor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: trade-predictor-db
    environment:
      - POSTGRES_USER=tradepredictor
      - POSTGRES_PASSWORD=secure_password_here
      - POSTGRES_DB=trade_predictor_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - trade-predictor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradepredictor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: trade-predictor-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trade-predictor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: trade-predictor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tp_client/dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - trade-predictor-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  trade-predictor-network:
    driver: bridge
