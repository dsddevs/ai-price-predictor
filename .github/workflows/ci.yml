name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # ====================== BACKEND ======================
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('tp_server/requirements.txt', 'tp_server/requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tp_server/requirements-dev.txt
          
      - name: Lint with flake8
        run: |
          cd tp_server
          flake8 . --count --show-source --statistics 

      - name: Check code formatting
        run: |
          cd tp_server
          black --check --diff .
          isort --check --diff .

      # Type checking temporarily disabled - see TODO_MYPY.md for details
      # - name: Type check with mypy
      #   run: |
      #     cd tp_server
      #     mypy .

      - name: Run tests with pytest
        run: |
          cd tp_server
          pytest

      - name: Verify server starts
        run: |
          echo "Starting server for smoke test..."
          timeout 10 uvicorn tp_server.app.server:app \
            --host 127.0.0.1 \
            --port 8001 \
            --log-level critical \
            --no-access-log || code=$?
          [ $code -eq 124 ] || [ $code -eq 0 ] || exit $code
          echo "Server started and stopped OK"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./tp_server/coverage.xml
          flags: backend
          name: backend-coverage
        if: always()

  # ====================== FRONTEND ======================
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tp_client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install
        run: npm ci

      - name: Lint & Build
        run: |
          npm run lint
          npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist

